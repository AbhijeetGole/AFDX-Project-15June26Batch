<template>
    <lightning-card title="Calculator">
        <div class="slds-p-around_medium">
            <lightning-input type="number" label="Number 1" value={num1} onchange={handleNum1}></lightning-input>
            <lightning-input type="number" label="Number 2" value={num2} onchange={handleNum2}></lightning-input>

            <div class="slds-m-top_medium">
                <lightning-button label="Add" onclick={add} class="slds-m-right_small"></lightning-button>
                <lightning-button label="Subtract" onclick={sub} class="slds-m-right_small"></lightning-button>
                <lightning-button label="Multiply" onclick={mul} class="slds-m-right_small"></lightning-button>
                <lightning-button label="Divide" onclick={div}></lightning-button>
            </div>

            <div class="slds-m-top_large">
                <strong>Result:</strong> {result}
            </div>
        </div>
    </lightning-card>
</template>
